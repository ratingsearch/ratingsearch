<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レイティング検索</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');
:root {
  --bg: #f4f6f9; --card: #ffffff; --border: #e2e6ed; --text: #1a1e2e;
  --text2: #6b7280; --accent: #1a56db; --up: #0e9f6e; --down: #e02424; --hdr: #111827;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--hdr);padding:20px 24px;display:flex;align-items:center;gap:12px;}
.header-text h1{font-size:16px;font-weight:700;color:white;letter-spacing:.04em;}
.header-text p{font-size:11px;color:#9ca3af;margin-top:2px;}
.container{max-width:800px;margin:0 auto;padding:24px 16px;}
.search-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;}
.search-card h2{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:16px;}
.search-row{display:flex;gap:10px;}
.search-row input{flex:1;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:16px;font-family:'DM Mono',monospace;color:var(--text);background:white;outline:none;transition:border-color .2s;}
.search-row input:focus{border-color:var(--accent);}
.search-row input::placeholder{color:#c0c8d8;font-family:'Noto Sans JP',sans-serif;font-size:14px;}
.btn-search{padding:12px 24px;background:var(--accent);color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;}
.btn-search:disabled{opacity:0.5;cursor:default;}
.btn-search:hover:not(:disabled){background:#1648c8;}
.type-row{display:flex;gap:8px;margin-top:12px;}
.type-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text2);transition:all .15s;}
.type-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
.loading{text-align:center;padding:48px;color:var(--text2);font-size:14px;display:none;}
.pong{font-size:32px;animation:pong 1s linear infinite;display:block;margin:0 auto 16px;}
@keyframes pong{0%{transform:translateY(0)}25%{transform:translateY(-10px)}50%{transform:translateY(0)}75%{transform:translateY(10px)}100%{transform:translateY(0)}}
.result{display:none;}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center;}
.stat .lbl{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500;}
.stat .val{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;}
.val.up{color:var(--up);}
.val.dn{color:var(--down);}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;margin-bottom:16px;}
.card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:white;font-size:12px;font-weight:500;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text2);transition:all .15s;}
.filter-btn.active{background:var(--hdr);border-color:var(--hdr);color:white;}
.chart-wrap{position:relative;width:100%;height:240px;margin-top:16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{padding:8px 12px;text-align:left;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);background:#f8fafc;white-space:nowrap;}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9;font-family:'DM Mono',monospace;font-size:13px;}
td.name-col{font-family:'Noto Sans JP',sans-serif;font-size:12px;}
tr:last-child td{border-bottom:none;}
.not-found,.fetch-error{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:48px 24px;text-align:center;color:var(--text2);font-size:14px;display:none;}
.empty{text-align:center;padding:48px 20px;color:var(--text2);font-size:14px;}
.empty-icon{font-size:48px;margin-bottom:16px;}
.ox{overflow-x:auto;}
@media(max-width:480px){.stats{gap:8px}.stat .val{font-size:18px;}}
</style>
</head>
<body>
<header>
  <div class="header-text">
    <h1>レイティング検索・比較</h1>
    <p>卓球レイティングポイント推移確認</p>
  </div>
</header>

<div class="container">
  <div class="search-card">
    <h2>会員番号で検索</h2>
    <div class="search-row">
      <input type="text" id="search-input" placeholder="会員番号を入力" inputmode="numeric">
      <button class="btn-search" id="search-btn" onclick="doSearch()">検索</button>
    </div>
    <div class="search-row" style="margin-top:8px;">
      <button class="type-btn" id="compare-btn" onclick="toggleCompare()">比較する</button>
      <input type="text" id="compare-input" placeholder="比較用会員番号" style="display:none;margin-top:8px;" inputmode="numeric">
    </div>
    <div class="type-row">
      <button class="type-btn active" onclick="setType('takkyu', this)">硬式</button>
      <button class="type-btn" onclick="setType('large', this)">ラージ</button>
    </div>
  </div>

  <div class="loading" id="loading"><span class="pong">🏓</span> データを取得中...</div>
  <div class="not-found" id="not-found"><div class="empty-icon">😔</div>該当するデータが見つかりませんでした</div>
  <div class="fetch-error" id="fetch-error"><div class="empty-icon">⚠️</div>データ取得に失敗しました</div>

  <div class="result" id="result">
    <div class="stats">
      <div class="stat"><div class="lbl">会員1 現在</div><div class="val" id="stat1-cur">—</div></div>
      <div class="stat"><div class="lbl">会員2 現在</div><div class="val" id="stat2-cur">—</div></div>
      <div class="stat"><div class="lbl">会員1 最高</div><div class="val" id="stat1-best">—</div></div>
      <div class="stat"><div class="lbl">会員2 最高</div><div class="val" id="stat2-best">—</div></div>
      <div class="stat"><div class="lbl">会員1 前回比</div><div class="val" id="stat1-diff">—</div></div>
      <div class="stat"><div class="lbl">会員2 前回比</div><div class="val" id="stat2-diff">—</div></div>
    </div>

    <div class="card">
      <div class="card-title">ポイント推移</div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </div>

    <div class="card">
      <div class="card-title">大会別一覧</div>
      <div class="filter-row" id="filter-row"></div>
      <div class="ox">
        <table>
          <thead><tr><th>日付</th><th>大会名</th><th>会員1</th><th>会員2</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/YOUR_API_HERE/exec';
let currentType='takkyu';
let data1=[], data2=[];
let chartInstance=null;

function setType(type, btn){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleCompare(){
  const input=document.getElementById('compare-input');
  input.style.display=input.style.display==='none'?'block':'none';
}

function hideAll(){
  ['loading','result','not-found','fetch-error'].forEach(id=>document.getElementById(id).style.display='none');
}

async function doSearch(){
  const btn=document.getElementById('search-btn');
  btn.disabled=true;
  const id1=document.getElementById('search-input').value.trim();
  const id2=document.getElementById('compare-input').value.trim();

  if(!id1){btn.disabled=false;return;}

  data1=[]; data2=[];
  if(chartInstance){chartInstance.destroy(); chartInstance=null;}
  hideAll();
  document.getElementById('loading').style.display='block';

  try{
    const res1=await fetch(`${API_URL}?id=${encodeURIComponent(id1)}&type=${currentType}`);
    const d1=await res1.json();
    data1=Array.isArray(d1)?d1:[];

    if(id2){
      const res2=await fetch(`${API_URL}?id=${encodeURIComponent(id2)}&type=${currentType}`);
      const d2=await res2.json();
      data2=Array.isArray(d2)?d2:[];
    }

    hideAll();
    if(!data1.length && !data2.length){
      document.getElementById('not-found').style.display='block';
      btn.disabled=false;
      return;
    }
    renderResult(id1,id2);
    document.getElementById('result').scrollIntoView({behavior:'smooth', block:'start'});
  }catch(e){
    hideAll();
    document.getElementById('fetch-error').style.display='block';
  }
  btn.disabled=false;
}

function renderResult(id1,id2){
  const cur1=data1.length?data1[data1.length-1]['レイティング']:null;
  const best1=data1.length?Math.max(...data1.map(d=>d['レイティング'])):null;
  const last1=data1.length>=2?cur1-data1[data1.length-2]['レイティング']:null;

  const cur2=data2.length?data2[data2.length-1]['レイティング']:null;
  const best2=data2.length?Math.max(...data2.map(d=>d['レイティング'])):null;
  const last2=data2.length>=2?cur2-data2[data2.length-2]['レイティング']:null;

  document.getElementById('stat1-cur').textContent=cur1!==null?cur1.toLocaleString():'—';
  document.getElementById('stat1-best').textContent=best1!==null?best1.toLocaleString():'—';
  const diffEl1=document.getElementById('stat1-diff');
  diffEl1.textContent=last1===null?'—':(last1>0?`+${last1}`:last1);
  diffEl1.className='val '+(last1>0?'up':last1<0?'dn':'');

  document.getElementById('stat2-cur').textContent=cur2!==null?cur2.toLocaleString():'—';
  document.getElementById('stat2-best').textContent=best2!==null?best2.toLocaleString():'—';
  const diffEl2=document.getElementById('stat2-diff');
  diffEl2.textContent=last2===null?'—':(last2>0?`+${last2}`:last2);
  diffEl2.className='val '+(last2>0?'up':last2<0?'dn':'');

  renderChartCompare();
  renderTableCompare();
  document.getElementById('result').style.display='block';
}

function renderChartCompare(){
  if(chartInstance) chartInstance.destroy();
  const allDates=new Set([...data1,...data2].map(d=>d['日付']));
  const dates=[...allDates].sort();
  const getData=(data)=>dates.map(d=>{
    const item=data.find(x=>x['日付']===d);
    return item?item['レイティング']:null;
  });
  const ds=[];
  if(data1.length) ds.push({label:'会員1', data:getData(data1), borderColor:'#1a56db', tension:0.2, spanGaps:true});
  if(data2.length) ds.push({label:'会員2', data:getData(data2), borderColor:'#e02424', tension:0.2, spanGaps:true});

  const ctx=document.getElementById('chart').getContext('2d');
  chartInstance=new Chart(ctx,{type:'line',data:{labels:dates,datasets:ds},options:{
    responsive:true,
    plugins:{legend:{position:'top'}},
    interaction:{mode:'nearest',intersect:false},
    scales:{x:{title:{display:true,text:'日付'}},y:{title:{display:true,text:'レイティング'}}}
  }});
}

function renderTableCompare(){
  const tbody=document.getElementById('table-body');
  tbody.innerHTML='';
  const allDates=new Set([...data1,...data2].map(d=>d['日付']));
  const dates=[...allDates].sort();
  dates.forEach(date=>{
    const row=document.createElement('tr');
    const d1=data1.find(x=>x['日付']===date);
    const d2=data2.find(x=>x['日付']===date);
    const tdDate=document.createElement('td'); tdDate.textContent=date; row.appendChild(tdDate);
    const tdName=document.createElement('td'); tdName.textContent=(d1?.大会名||d2?.大会名||'—'); row.appendChild(tdName);
    const td1=document.createElement('td'); td1.textContent=d1?d1['レイティング']:'—'; row.appendChild(td1);
    const td2=document.createElement('td'); td2.textContent=d2?d2['レイティング']:'—'; row.appendChild(td2);
    tbody.appendChild(row);
  });
}
</script>
</body>
</html>
